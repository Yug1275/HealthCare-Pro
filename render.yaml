services:
  - type: web
    name: healthcare-pro
    env: php
    buildCommand: ""
    startCommand: "php -S 0.0.0.0:$PORT -t ."
    envVars:
      - key: MYSQL_HOST
        fromDatabase:
          name: healthcare-db
          property: host
      - key: MYSQL_DATABASE
        fromDatabase:
          name: healthcare-db
          property: database
      - key: MYSQL_USERNAME
        fromDatabase:
          name: healthcare-db
          property: user
      - key: MYSQL_PASSWORD
        fromDatabase:
          name: healthcare-db
          property: password
      - key: MYSQL_PORT
        fromDatabase:
          name: healthcare-db
          property: port

databases:
  - name: healthcare-db
    databaseName: healthcare_pro
    user: healthcare_user
